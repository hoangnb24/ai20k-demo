name: Build and Deploy VPS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/web

jobs:
  build:
    name: Build and push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Prepare SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Log in to GHCR on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$GHCR_TOKEN" ]; then
            echo "GHCR_TOKEN is empty; skipping registry login on the VPS."
            exit 0
          fi
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/vps_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Pull and restart web stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_STACK_PATH: ${{ secrets.VPS_STACK_PATH }}
          WEB_IMAGE: ghcr.io/${{ github.repository }}/web:sha-${{ github.sha }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/vps_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_STACK_PATH' && \
             WEB_IMAGE='$WEB_IMAGE' docker compose --env-file .env.prod -f compose.prod.yml pull web && \
             WEB_IMAGE='$WEB_IMAGE' docker compose --env-file .env.prod -f compose.prod.yml up -d --remove-orphans && \
             docker compose --env-file .env.prod -f compose.prod.yml ps"
